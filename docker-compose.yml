version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ── Distributed Tracing — Jaeger all-in-one (issue #401) ─────────────────
  # Exposes:
  #   4317 — OTLP gRPC receiver
  #   4318 — OTLP HTTP receiver  ← used by OTEL_EXPORTER_OTLP_ENDPOINT
  #   16686 — Jaeger UI
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: app-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Retain trace data for 30 days (issue #401 — 30-day retention requirement)
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
      - BADGER_SPAN_STORE_TTL=720h   # 720 h = 30 days
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
      - '16686:16686' # Jaeger UI
    volumes:
      - jaeger-data:/badger
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: app-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: app-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  jaeger-data:
